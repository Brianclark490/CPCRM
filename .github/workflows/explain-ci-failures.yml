name: Explain CI Failures
 
on:
  workflow_run:
    workflows:
      - "CI"
      - "DB Connection Gate"
    types:
      - completed
 
jobs:
  explain-failure:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
 
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });
            if (pulls.data.length > 0) {
              core.setOutput('number', pulls.data[0].number);
            } else {
              core.setOutput('number', '');
            }
 
      - name: Get failed job logs
        if: steps.pr.outputs.number != ''
        id: logs
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
 
            let failureSummary = '';
 
            for (const job of jobs.data.jobs) {
              if (job.conclusion === 'failure') {
                failureSummary += `\n### Job: ${job.name}\n`;
 
                // Get the log for this job
                try {
                  const log = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    job_id: job.id,
                  });
 
                  // Get last 150 lines (where errors usually are)
                  const lines = log.data.split('\n');
                  const tail = lines.slice(-150).join('\n');
                  failureSummary += '```\n' + tail + '\n```\n';
                } catch (e) {
                  failureSummary += 'Could not retrieve logs.\n';
                }
 
                // Add failed steps
                for (const step of job.steps || []) {
                  if (step.conclusion === 'failure') {
                    failureSummary += `**Failed step:** ${step.name}\n`;
                  }
                }
              }
            }
 
            // Truncate if too long for the API
            if (failureSummary.length > 30000) {
              failureSummary = failureSummary.substring(0, 30000) + '\n\n... (truncated)';
            }
 
            core.setOutput('summary', failureSummary);
 
      - name: Ask Claude to explain
        if: steps.pr.outputs.number != '' && steps.logs.outputs.summary != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          pr_number: ${{ steps.pr.outputs.number }}
          prompt: |
            The CI workflow "${{ github.event.workflow_run.name }}" failed on this PR.
 
            Here are the failed job logs:
            ${{ steps.logs.outputs.summary }}
 
            Please analyse the failure and post a helpful comment on the PR that includes:
 
            1. **What failed** — a one-line summary of the root cause
            2. **Why it failed** — explain the actual error, not just the symptom
            3. **How to fix it** — specific steps or code changes needed
 
            Keep it concise. If the fix is simple (like a missing import or type error),
            just say what to change. If it's complex, explain the approach.
 
            Do NOT attempt to fix the code — just explain the failure.
          allowed_tools: |
            Read
            Grep
            Glob
