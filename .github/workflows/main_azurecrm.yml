# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - AzureCRM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Build frontend
        run: npm run build
        working-directory: apps/web
        env:
          VITE_DESCOPE_PROJECT_ID: ${{ secrets.VITE_DESCOPE_PROJECT_ID }}

      - name: Test app
        run: npm run test --if-present

      - name: Prepare release package
        run: |
          mkdir -p $GITHUB_WORKSPACE/release
          cp package.json $GITHUB_WORKSPACE/release/
          cp -r dist $GITHUB_WORKSPACE/release/dist
          cp -r $GITHUB_WORKSPACE/apps/web/dist $GITHUB_WORKSPACE/release/public
          cd $GITHUB_WORKSPACE/release && npm install --omit=dev
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: node-app
          path: release

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8DFD7369E2A74E40B7C5B084BA06579A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B95EA56C36454F81A0F5E4549C62428E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_37399C3DD4634AC3875D36E6A64C2087 }}

      - name: Configure App Service settings
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='AzureCRM'].resourceGroup" -o tsv)
          if [[ -z "$RESOURCE_GROUP" ]]; then
            echo "ERROR: Could not determine resource group for App Service 'AzureCRM'." >&2
            exit 1
          fi
          # DATABASE_URL is set directly here for simplicity.
          # For tighter security in production, store the connection string in Azure Key Vault
          # and replace this value with a Key Vault reference:
          #   @Microsoft.KeyVault(VaultName=<vault>;SecretName=postgres-connection-string)
          az webapp config appsettings set \
            --name AzureCRM \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              NODE_ENV="production" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              DESCOPE_PROJECT_ID="${{ secrets.VITE_DESCOPE_PROJECT_ID }}"
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: AzureCRM
          slot-name: Production
          package: release
