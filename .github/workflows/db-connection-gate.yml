name: DB Connection Gate

# Runs on PRs to main and before any deploy workflow
on:
  pull_request:
    branches: [main]
  workflow_call:
    # Other workflows can call this as a reusable gate
    outputs:
      db_healthy:
        description: "Whether the DB connection succeeded"
        value: ${{ jobs.db-check.outputs.healthy }}

jobs:
  build-check:
    name: Build + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  db-check:
    name: PostgreSQL connection check
    needs: build-check
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.health.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Verify all required DB env vars are present
      - name: Check required environment variables
        run: |
          missing=""
          [ -z "$PGHOST" ] && missing="$missing PGHOST"
          [ -z "$PGUSER" ] && missing="$missing PGUSER"
          [ -z "$PGPASSWORD" ] && missing="$missing PGPASSWORD"
          [ -z "$PGDATABASE" ] && missing="$missing PGDATABASE"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Add these in Settings > Secrets > Actions, or in a 'production' environment."
            exit 1
          fi
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGDATABASE: ${{ secrets.PGDATABASE }}

      # Run the actual connection test
      - name: Test PostgreSQL connection
        id: health
        run: |
          node -e "
          const { Client } = require('pg');

          const client = new Client({
            host: process.env.PGHOST,
            port: parseInt(process.env.PGPORT || '5432'),
            user: process.env.PGUSER,
            password: process.env.PGPASSWORD,
            database: process.env.PGDATABASE,
            ssl: { rejectUnauthorized: false },
            connectionTimeoutMillis: 10000,
            query_timeout: 5000,
          });

          async function check() {
            try {
              await client.connect();
              console.log('✓ Connected to PostgreSQL');

              // Basic health query
              const res = await client.query('SELECT version(), current_database(), current_user');
              console.log('✓ Server:', res.rows[0].version.split(',')[0]);
              console.log('✓ Database:', res.rows[0].current_database);
              console.log('✓ User:', res.rows[0].current_user);

              // Check tables exist (catches missing migrations)
              const tables = await client.query(
                \"SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name\"
              );
              if (tables.rows.length === 0) {
                console.log('⚠ WARNING: No tables found in public schema — migrations may not have run');
              } else {
                console.log('✓ Tables found:', tables.rows.map(r => r.table_name).join(', '));
              }

              await client.end();
              console.log('✓ Connection closed cleanly');
              console.log('::set-output name=status::healthy');
            } catch (err) {
              console.error('✗ DB connection failed:', err.message);

              if (err.message.includes('ECONNREFUSED') || err.message.includes('ETIMEDOUT')) {
                console.error('');
                console.error('Likely cause: GitHub Actions runner cannot reach the private endpoint.');
                console.error('The DB has publicNetworkAccess: Disabled and is on a private subnet.');
                console.error('');
                console.error('Options:');
                console.error('  1. Enable \"Allow access to Azure services\" on the PG server');
                console.error('  2. Use a self-hosted runner inside your VNet');
                console.error('  3. Add a temporary firewall rule via azure/login + az CLI');
              }

              if (err.message.includes('password authentication failed')) {
                console.error('');
                console.error('Check that PGUSER and PGPASSWORD secrets match the DB admin credentials.');
                console.error('Admin user for this server: tszopegcfd');
              }

              if (err.message.includes('does not exist')) {
                console.error('');
                console.error('The database name in PGDATABASE may be wrong, or it has not been created yet.');
              }

              console.error('::set-output name=status::unhealthy');
              process.exit(1);
            }
          }

          check();
          "
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          PGDATABASE: ${{ secrets.PGDATABASE }}

  # Summary job that blocks the PR if anything failed
  gate:
    name: Deploy gate
    needs: [build-check, db-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Build: ${{ needs.build-check.result }}"
          echo "DB:    ${{ needs.db-check.result }}"

          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "::error::Build failed — fix build errors before deploying"
            exit 1
          fi

          if [ "${{ needs.db-check.result }}" != "success" ]; then
            echo "::error::DB connection failed — fix database connectivity before deploying"
            exit 1
          fi

          echo "✓ All checks passed — safe to deploy"
