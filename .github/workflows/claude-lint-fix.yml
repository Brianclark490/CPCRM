name: Claude Lint Fix

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  lint-check:
    runs-on: ubuntu-latest
    outputs:
      lint_failed: ${{ steps.lint.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: lint
        run: npm run lint
        continue-on-error: true

  lint-fix:
    needs: lint-check
    if: needs.lint-check.outputs.lint_failed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fix lint issues with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The lint check failed on this PR. Please:
            1. Run `npm run lint` to see the current errors
            2. Fix all ESLint and Prettier issues
            3. Run `npx tsc --noEmit` to verify no type errors introduced
            4. Commit fixes with message "fix: auto-fix lint issues"
          allowed_tools: |
            Bash
            Read
            Write
            Edit
            Glob
            Grep
            MultiEdit
